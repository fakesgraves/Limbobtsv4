name: Build LimboBots

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # В репозитории лежит архив LimboBots.zip (со всем исходным кодом
      # плагина внутри папки LimboBots/). Распаковываем его прямо в корень
      # рабочей директории раннера, чтобы дальше собирать как обычный
      # Maven-проект (pom.xml окажется в корне репозитория).
      - name: Unzip LimboBots.zip
        run: |
          if [ -f "LimboBots.zip" ]; then
            echo "Найден LimboBots.zip, распаковываю..."
            unzip -o LimboBots.zip -d /tmp/limbobots-extracted
            # Внутри архива всё лежит в подпапке LimboBots/ - переносим
            # содержимое этой подпапки в корень репозитория.
            cp -rT /tmp/limbobots-extracted/LimboBots ./
          elif [ -f "pom.xml" ]; then
            echo "LimboBots.zip не найден, но pom.xml уже есть в корне - продолжаю как есть."
          else
            echo ": :error::Не найден ни LimboBots.zip, ни pom.xml в корне репозитория."
            exit 1
          fi

      - name: Verify project structure
        run: |
          test -f pom.xml && echo "pom.xml на месте" || (echo ": :error::pom.xml не найден после распаковки" && exit 1)

      # Ставим сразу две JDK:
      # - 8, потому что BuildTools для старого ядра 1.16.5 надёжно работает
      #   именно на Java 8 (на новых JDK может отказаться собираться);
      # - 17, чтобы собирать сам плагин современным тулчейном.
      - name: Set up JDK 8 and JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            17
          cache: maven

      - name: Cache Spigot BuildTools output
        id: spigot-cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/spigotmc
          key: spigot-1.16.5-r0.1-snapshot-${{ runner.os }}

      - name: Build Spigot 1.16.5 via BuildTools (if not cached)
        if: steps.spigot-cache.outputs.cache-hit != 'true'
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_8_X64 }}
        run: |
          mkdir -p /tmp/buildtools
          cd /tmp/buildtools
          curl -o BuildTools.jar -L https: //hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          "$JAVA_HOME/bin/java" -jar BuildTools.jar --rev 1.16.5

      - name: Build plugin with Maven (JDK 17)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: mvn -B clean package

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: LimboBots
          path: target/LimboBots.jar
